<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PTO Tracker</title>

<style>
:root {
    --primary: #4f46e5;
    --danger: #ef4444;
    --bg: #f5f7fb;
    --card: #ffffff;
    --border: #e5e7eb;
}

body {
    font-family: Arial;
    background: var(--bg);
    padding: 20px;
}

.container {
    max-width: 950px;
    margin: auto;
}

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.input-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

input {
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
}

button {
    padding: 10px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.btn-danger {
    background: var(--danger);
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    text-align: center;
}

.result {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
}

.result-box {
    background: #eef2ff;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📅 PTO Tracker</h2>

<!-- INPUT -->
<div class="card">
    <div class="input-grid">
        <input type="date" id="startDate">
        <input type="date" id="endDate">
        <input type="number" id="hoursWorked" placeholder="Total Hours Worked">
        <input type="number" id="ptoUsed" placeholder="PTO Used">
    </div>

    <button onclick="addEntry()" style="margin-top:10px;">+ Add Entry</button>

    <table>
        <thead>
            <tr>
                <th>Start</th>
                <th>End</th>
                <th>Hours</th>
                <th>PTO Used</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<!-- RESULT -->
<div class="card">

    <div style="display:flex; gap:10px; margin-bottom:10px;">
        <button onclick="calculatePTO()">Calculate PTO</button>
        <input type="number" id="startingPTO" placeholder="Starting PTO">
    </div>

    <div class="result">
        <div class="result-box">
            <h3 id="totalReported">0</h3>
            <p>Total Submitted</p>
        </div>

        <div class="result-box">
            <h3 id="totalWorked">0</h3>
            <p>Worked Hours</p>
        </div>

        <div class="result-box">
            <h3 id="earnedPTO">0</h3>
            <p>PTO Earned</p>
        </div>

        <div class="result-box">
            <h3 id="ptoUsedTotal">0</h3>
            <p>PTO Used</p>
        </div>

        <div class="result-box">
            <h3 id="remainingPTO">0</h3>
            <p>Remaining PTO</p>
        </div>

        <div class="result-box">
            <h3 id="ptoDays">0</h3>
            <p>PTO Days (6h)</p>
        </div>
    </div>
</div>

</div>

<script>
// LOAD FROM STORAGE
let entries = JSON.parse(localStorage.getItem("ptoEntries")) || [];

// SAVE FUNCTION
function saveEntries() {
    localStorage.setItem("ptoEntries", JSON.stringify(entries));
}

// ADD ENTRY
function addEntry() {
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    const hours = parseFloat(document.getElementById('hoursWorked').value);
    const ptoUsed = parseFloat(document.getElementById('ptoUsed').value) || 0;

    if (!start || !end || !hours) {
        alert("Fill all required fields");
        return;
    }

    entries.push({ start, end, hours, ptoUsed });
    saveEntries();
    renderTable();

    document.getElementById('hoursWorked').value = '';
    document.getElementById('ptoUsed').value = '';
}

// RENDER TABLE
function renderTable() {
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    entries.forEach((e, i) => {
        table.innerHTML += `
            <tr>
                <td>${e.start}</td>
                <td>${e.end}</td>
                <td>${e.hours}</td>
                <td>${e.ptoUsed}</td>
                <td><button class="btn-danger" onclick="removeEntry(${i})">X</button></td>
            </tr>
        `;
    });
}

// REMOVE ENTRY
function removeEntry(i) {
    entries.splice(i, 1);
    saveEntries();
    renderTable();
}

// CALCULATE PTO
function calculatePTO() {
    const PTO_PER_YEAR = 80;
    const WORK_HOURS_PER_YEAR = 1716;

    const accrualRate = PTO_PER_YEAR / WORK_HOURS_PER_YEAR;

    let totalReported = 0;
    let totalWorked = 0;
    let totalUsed = 0;

    entries.forEach(e => {
        const hours = parseFloat(e.hours) || 0;
        const used = parseFloat(e.ptoUsed) || 0;

        totalReported += hours;
        totalUsed += used;
        totalWorked += (hours - used);
    });

    const startingPTO = parseFloat(document.getElementById("startingPTO").value) || 0;

    const earnedPTO = totalWorked * accrualRate;
    const remainingPTO = startingPTO + earnedPTO - totalUsed;
    const ptoDays = remainingPTO / 6;

    document.getElementById("totalReported").textContent = totalReported.toFixed(1);
    document.getElementById("totalWorked").textContent = totalWorked.toFixed(1);
    document.getElementById("earnedPTO").textContent = earnedPTO.toFixed(2);
    document.getElementById("ptoUsedTotal").textContent = totalUsed.toFixed(2);
    document.getElementById("remainingPTO").textContent = remainingPTO.toFixed(2);
    document.getElementById("ptoDays").textContent = ptoDays.toFixed(2);
}

// LOAD STARTING PTO
const startingInput = document.getElementById("startingPTO");
const savedPTO = localStorage.getItem("startingPTO");

if (savedPTO !== null) {
    startingInput.value = savedPTO;
}

startingInput.addEventListener("input", () => {
    localStorage.setItem("startingPTO", startingInput.value);
});

// INITIAL LOAD
window.onload = function() {
    renderTable();
};
</script>

</body>
</html>
